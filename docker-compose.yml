version: '2'

services:
  web:
    build: .
    links:
      - database
    ports:
      - "80:80"
    volumes:
      - ".:/var/www/html"
  database:
    image: mysql:5.5
    ports:
      - "3306:3306"
    volumes:
      - "./app/sql:/docker-entrypoint-initdb.d"
    environment:
      MYSQL_ROOT_PASSWORD: ecd
      MYSQL_DATABASE: ecd
      MYSQL_USER: ecd
      MYSQL_PASSWORD: ecd
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "81:80"
    links:
      - database
    environment:
      PMA_HOST: database
  web_prod:
    build:
      context: .
      dockerfile: ./Dockerfile.prod
    links:
      - database
    ports:
      - "82:80"
    volumes:
      - ".:/var/www/html"
