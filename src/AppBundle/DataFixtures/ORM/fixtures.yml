AppBundle\Entity\Klant:
    klant_{1..200}:
        roepnaam: '<firstname()>'
        voornaam: '<firstname()>'
        achternaam: '<lastname()>'
        geslacht: '@geslacht_*'
        geboortedatum: '<date()>'
        adres: '<streetAddress()>'
        postcode: '<postcode()>'
        plaats: '<city()>'
        mobiel: '<phoneNumber()>'
        telefoon: '<phoneNumber()>'
        email: '<email()>'
        laatsteTbcControle: '<dateTimeThisDecade()>'
        laatsteZrm: '<dateTimeThisDecade()>'
#        addIntake: ['@intake_<current()>']
#        laatsteRegistratie: '@registratie_*'
        overleden: '10%? 1 : 0'
        disabled: '10%? 1 : 0'
        werkgebied: '80%? @werkgebied_*'
        postcodegebied: '80%? @ggw_gebied_*'
        geenPost: '10%? 1 : 0'
        geenEmail: '10%? 1 : 0'
        medewerker: '@medewerker_*'
        roker: '30%? true'
        dierenbezitter: '30%? true'

